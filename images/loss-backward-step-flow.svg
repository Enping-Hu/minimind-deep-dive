<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">loss backward optimizer step training flow</title>
  <desc id="desc">MiniMind training flow from batch and model parameters to loss, gradients, optimizer step, and updated parameters.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="52%" stop-color="#f5f0df"/>
      <stop offset="100%" stop-color="#eef7ef"/>
    </linearGradient>
    <linearGradient id="cardA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#edf6ff"/>
    </linearGradient>
    <linearGradient id="cardB" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fffaf0"/>
      <stop offset="100%" stop-color="#f3ead0"/>
    </linearGradient>
    <linearGradient id="cardC" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3fff4"/>
      <stop offset="100%" stop-color="#dff0e1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#263238" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#34495e"/>
    </marker>
    <style>
      .title { font: 700 30px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2d3d; }
      .subtitle { font: 500 15px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5b6770; }
      .card-title { font: 700 18px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2d3d; }
      .card-text { font: 500 14px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #35444f; }
      .code { font: 600 14px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #21313f; }
      .small { font: 500 12px "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #62717c; }
      .arrow { stroke: #34495e; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .soft-arrow { stroke: #8b6f2e; stroke-width: 2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrow); }
      .badge { font: 700 12px "JetBrains Mono", "SFMono-Regular", Consolas, monospace; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1180" height="520" rx="28" fill="url(#bg)"/>
  <circle cx="1080" cy="74" r="86" fill="#dceeff" opacity="0.7"/>
  <circle cx="94" cy="440" r="120" fill="#e2f1d8" opacity="0.65"/>
  <path d="M60 120 C220 70, 330 160, 500 112 S820 48, 1110 134" stroke="#ffffff" stroke-width="22" opacity="0.55" fill="none"/>

  <text x="48" y="54" class="title">loss / backward / optimizer.step：训练到底怎么改参数</text>
  <text x="50" y="82" class="subtitle">同一条底层链路支撑 Pretrain、SFT、DPO、PPO/GRPO/SPO，只是 loss 或 objective 的来源不同。</text>

  <g filter="url(#shadow)">
    <rect x="52" y="132" width="188" height="124" rx="20" fill="url(#cardA)" stroke="#c7d8e8"/>
    <rect x="72" y="150" width="38" height="24" rx="12" fill="#3c78a8"/>
    <text x="84" y="167" class="badge">1</text>
    <text x="72" y="194" class="card-title">batch 输入</text>
    <text x="72" y="222" class="code">input_ids, labels</text>
    <text x="72" y="244" class="small">数据给出监督位置</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="292" y="132" width="190" height="124" rx="20" fill="url(#cardA)" stroke="#c7d8e8"/>
    <rect x="312" y="150" width="38" height="24" rx="12" fill="#3c78a8"/>
    <text x="324" y="167" class="badge">2</text>
    <text x="312" y="194" class="card-title">模型前向</text>
    <text x="312" y="222" class="code">model(...)</text>
    <text x="312" y="244" class="small">参数参与计算 logits</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="534" y="132" width="190" height="124" rx="20" fill="url(#cardB)" stroke="#dec987"/>
    <rect x="554" y="150" width="38" height="24" rx="12" fill="#9b7627"/>
    <text x="566" y="167" class="badge">3</text>
    <text x="554" y="194" class="card-title">得到标量 loss</text>
    <text x="554" y="222" class="code">res.loss + aux_loss</text>
    <text x="554" y="244" class="small">把“错多少”压成一个数</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="776" y="132" width="190" height="124" rx="20" fill="url(#cardB)" stroke="#dec987"/>
    <rect x="796" y="150" width="38" height="24" rx="12" fill="#9b7627"/>
    <text x="808" y="167" class="badge">4</text>
    <text x="796" y="194" class="card-title">反向传播</text>
    <text x="796" y="222" class="code">loss.backward()</text>
    <text x="796" y="244" class="small">计算并累积 param.grad</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="534" y="324" width="190" height="124" rx="20" fill="url(#cardC)" stroke="#b9d2bd"/>
    <rect x="554" y="342" width="38" height="24" rx="12" fill="#4f8c5f"/>
    <text x="566" y="359" class="badge">5</text>
    <text x="554" y="386" class="card-title">梯度裁剪</text>
    <text x="554" y="414" class="code">clip_grad_norm_</text>
    <text x="554" y="436" class="small">防止单步梯度过大</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="776" y="324" width="190" height="124" rx="20" fill="url(#cardC)" stroke="#b9d2bd"/>
    <rect x="796" y="342" width="38" height="24" rx="12" fill="#4f8c5f"/>
    <text x="808" y="359" class="badge">6</text>
    <text x="796" y="386" class="card-title">参数更新</text>
    <text x="796" y="414" class="code">optimizer.step()</text>
    <text x="796" y="436" class="small">读取 grad，改动参数</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1000" y="324" width="128" height="124" rx="20" fill="#ffffff" stroke="#cfd8dc"/>
    <text x="1021" y="386" class="card-title">清空梯度</text>
    <text x="1021" y="414" class="code">zero_grad</text>
    <text x="1021" y="436" class="small">准备下一轮</text>
  </g>

  <path class="arrow" d="M242 194 H286"/>
  <path class="arrow" d="M484 194 H528"/>
  <path class="arrow" d="M726 194 H770"/>
  <path class="arrow" d="M871 258 V316"/>
  <path class="arrow" d="M728 386 H770"/>
  <path class="arrow" d="M968 386 H994"/>
  <path class="soft-arrow" d="M1064 320 C1078 238, 1018 106, 914 104 C760 100, 585 96, 398 98 C256 100, 182 110, 146 130"/>

  <rect x="58" y="312" width="386" height="138" rx="20" fill="#ffffff" opacity="0.92" stroke="#d8dee4"/>
  <text x="82" y="346" class="card-title">关键记忆</text>
  <text x="82" y="378" class="card-text">1. backward 只把梯度写到参数上，不直接改参数。</text>
  <text x="82" y="406" class="card-text">2. step 才根据梯度真正更新参数。</text>
  <text x="82" y="434" class="card-text">3. zero_grad 防止上一轮梯度混进下一轮。</text>
</svg>
