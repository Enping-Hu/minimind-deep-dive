<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="980" viewBox="0 0 1500 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef7f4"/>
    </linearGradient>
    <linearGradient id="mainBox" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="attnBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0f2fe"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="ffnBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#64748b" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#15803d"/>
    </marker>
    <style>
      .title { font: 800 38px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #0f172a; }
      .subtitle { font: 500 19px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #475569; }
      .label { font: 700 23px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #0f172a; }
      .code { font: 700 20px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #334155; }
      .small { font: 500 16px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #475569; }
      .note { font: 600 17px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #334155; }
      .hint { font: 500 15px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #64748b; }
      .box { fill: url(#mainBox); stroke: #cbd5e1; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .norm { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .attn { fill: url(#attnBox); stroke: #2563eb; stroke-width: 2.4; rx: 20; filter: url(#shadow); }
      .ffn { fill: url(#ffnBox); stroke: #16a34a; stroke-width: 2.4; rx: 20; filter: url(#shadow); }
      .add { fill: #fef3c7; stroke: #d97706; stroke-width: 2.2; rx: 999; filter: url(#shadow); }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .residual { stroke: #15803d; stroke-width: 3.2; fill: none; marker-end: url(#arrowGreen); stroke-dasharray: 10 8; }
      .band { fill: #ffffff; stroke: #dbe7f3; stroke-width: 2; rx: 24; filter: url(#shadow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="980" fill="url(#bg)"/>

  <text x="70" y="70" class="title">MiniMindBlock 的信息流</text>
  <text x="70" y="104" class="subtitle">一层 Transformer Block 会先做 Attention 更新，再做 FFN/MoE 更新；每个子层都有自己的 RMSNorm 和残差连接。</text>

  <rect x="62" y="132" width="1376" height="770" class="band"/>

  <!-- Main vertical path -->
  <rect x="585" y="165" width="330" height="70" class="box"/>
  <text x="750" y="194" text-anchor="middle" class="label">输入表示</text>
  <text x="750" y="220" text-anchor="middle" class="code">hidden_states</text>

  <path d="M750 235 L750 278" class="arrow"/>

  <rect x="585" y="278" width="330" height="72" class="norm"/>
  <text x="750" y="306" text-anchor="middle" class="label">RMSNorm</text>
  <text x="750" y="333" text-anchor="middle" class="small">input_layernorm</text>

  <path d="M750 350 L750 393" class="arrow"/>

  <rect x="545" y="393" width="410" height="92" class="attn"/>
  <text x="750" y="425" text-anchor="middle" class="label">Self-Attention</text>
  <text x="750" y="454" text-anchor="middle" class="small">内部包含 Q/K/V、RoPE、GQA、repeat_kv</text>
  <text x="750" y="475" text-anchor="middle" class="hint">负责 token 之间的信息交互</text>

  <path d="M750 485 L750 530" class="arrow"/>

  <circle cx="750" cy="556" r="34" class="add"/>
  <text x="750" y="564" text-anchor="middle" class="label">+</text>
  <text x="845" y="562" class="note">加回残差 1</text>

  <path d="M750 590 L750 635" class="arrow"/>

  <rect x="585" y="635" width="330" height="72" class="norm"/>
  <text x="750" y="663" text-anchor="middle" class="label">RMSNorm</text>
  <text x="750" y="690" text-anchor="middle" class="small">post_attention_layernorm</text>

  <path d="M750 707 L750 750" class="arrow"/>

  <rect x="545" y="750" width="410" height="92" class="ffn"/>
  <text x="750" y="782" text-anchor="middle" class="label">FeedForward / MoE</text>
  <text x="750" y="811" text-anchor="middle" class="small">SwiGLU 或专家网络</text>
  <text x="750" y="832" text-anchor="middle" class="hint">负责对每个 token 表示做非线性加工</text>

  <path d="M750 842 L750 887" class="arrow"/>

  <circle cx="750" cy="913" r="34" class="add"/>
  <text x="750" y="921" text-anchor="middle" class="label">+</text>
  <text x="845" y="919" class="note">加回残差 2</text>

  <!-- Residual branch 1 -->
  <path d="M585 200 C 390 200, 330 285, 330 430 C 330 532, 455 556, 712 556" class="residual"/>
  <rect x="168" y="310" width="260" height="82" class="box"/>
  <text x="298" y="342" text-anchor="middle" class="label">残差分支 1</text>
  <text x="298" y="370" text-anchor="middle" class="small">保留进入 Attention 前的信息</text>

  <!-- Residual branch 2 -->
  <path d="M585 556 C 390 556, 330 650, 330 785 C 330 887, 455 913, 712 913" class="residual"/>
  <rect x="168" y="676" width="260" height="82" class="box"/>
  <text x="298" y="708" text-anchor="middle" class="label">残差分支 2</text>
  <text x="298" y="736" text-anchor="middle" class="small">保留进入 FFN/MoE 前的信息</text>

  <!-- Output note -->
  <rect x="1020" y="846" width="280" height="94" class="box"/>
  <text x="1160" y="881" text-anchor="middle" class="label">输出表示</text>
  <text x="1160" y="910" text-anchor="middle" class="code">hidden_states</text>
  <text x="1160" y="932" text-anchor="middle" class="hint">送入下一层 block</text>
  <path d="M784 913 L1020 893" class="arrow"/>

  <!-- Key idea panel -->
  <rect x="1010" y="190" width="335" height="245" class="box"/>
  <text x="1178" y="228" text-anchor="middle" class="label">记忆重点</text>
  <text x="1040" y="268" class="note">1. 这是 Pre-Norm 结构</text>
  <text x="1040" y="304" class="note">2. Attention 负责跨 token 交互</text>
  <text x="1040" y="340" class="note">3. FFN/MoE 负责特征加工</text>
  <text x="1040" y="376" class="note">4. 两次残差都是“增量更新”</text>
  <text x="1040" y="412" class="note">5. RoPE/GQA 在 Attention 内部</text>
</svg>
