<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">MiniMind PPO ratio、clip、critic 与 old actor 流程图</title>
  <desc id="desc">展示 MiniMind PPO 中 prompt 生成回答、reward 打分、critic 估值、old actor 比较、reference 约束和 PPO loss 的关系。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fbfaf5"/>
      <stop offset="0.48" stop-color="#eef7f8"/>
      <stop offset="1" stop-color="#f6f0ff"/>
    </linearGradient>
    <linearGradient id="actor" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f6f8b"/>
      <stop offset="1" stop-color="#40a89a"/>
    </linearGradient>
    <linearGradient id="loss" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#d66b2f"/>
      <stop offset="1" stop-color="#b94a6b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#1d2d3d" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#344d5e"/>
    </marker>
    <style>
      .title { font: 700 30px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #173247; }
      .subtitle { font: 400 15px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #52677a; }
      .card { fill: #ffffff; stroke: #d8e3ea; stroke-width: 1.3; rx: 22; filter: url(#shadow); }
      .soft { fill: #f7fbfd; stroke: #cddde6; stroke-width: 1.2; rx: 18; }
      .dark-title { font: 700 18px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #173247; }
      .light-title { font: 700 18px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #ffffff; }
      .text { font: 400 14px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #43576a; }
      .small { font: 400 12px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #647789; }
      .code { font: 600 13px 'JetBrains Mono', 'Menlo', monospace; fill: #24485d; }
      .white-code { font: 600 13px 'JetBrains Mono', 'Menlo', monospace; fill: #ffffff; }
      .arrow { stroke: #344d5e; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #8ba0ad; stroke-width: 2.1; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 6; }
      .note { font: 700 12px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #ffffff; }
    </style>
  </defs>

  <rect width="1180" height="760" fill="url(#bg)"/>
  <circle cx="1028" cy="110" r="120" fill="#dfb3ff" opacity="0.18"/>
  <circle cx="118" cy="642" r="155" fill="#5bb4a4" opacity="0.13"/>
  <path d="M0 118 C168 62 302 174 474 120 S760 70 948 142 S1100 190 1180 150" fill="none" stroke="#93b7c8" stroke-width="2" opacity="0.45"/>

  <text x="58" y="58" class="title">PPO：ratio、clip、critic 与 old actor</text>
  <text x="58" y="86" class="subtitle">把源码里的五个角色拆开：actor 生成更新，reward model 打分，critic 估 baseline，old actor 算更新幅度，ref model 防漂移。</text>

  <g transform="translate(70,132)">
    <rect class="card" width="170" height="92"/>
    <text x="24" y="35" class="dark-title">Prompt</text>
    <text x="24" y="60" class="text">RLAIFDataset</text>
    <text x="24" y="78" class="small">只给生成起点</text>
  </g>

  <g transform="translate(310,128)">
    <rect width="205" height="100" rx="22" fill="url(#actor)" filter="url(#shadow)"/>
    <text x="26" y="36" class="light-title">Actor / Policy</text>
    <text x="26" y="62" class="white-code">generate()</text>
    <text x="26" y="82" class="note">当前会被训练的模型</text>
  </g>

  <g transform="translate(585,132)">
    <rect class="card" width="175" height="92"/>
    <text x="24" y="35" class="dark-title">Completion</text>
    <text x="24" y="60" class="text">生成回答</text>
    <text x="24" y="78" class="small">gen_out[:, prompt:]</text>
  </g>

  <g transform="translate(830,132)">
    <rect class="card" width="220" height="92"/>
    <text x="24" y="35" class="dark-title">Reward Model</text>
    <text x="24" y="60" class="text">给回答打分</text>
    <text x="24" y="78" class="code">rewards: [B]</text>
  </g>

  <path class="arrow" d="M240 178 H305"/>
  <path class="arrow" d="M515 178 H580"/>
  <path class="arrow" d="M760 178 H825"/>

  <g transform="translate(90,310)">
    <rect class="card" width="260" height="142"/>
    <text x="24" y="36" class="dark-title">Critic</text>
    <text x="24" y="64" class="text">对同一序列估计 value</text>
    <text x="24" y="90" class="code">values: [B]</text>
    <text x="24" y="116" class="code">adv = reward - value</text>
  </g>

  <g transform="translate(460,300)">
    <rect class="card" width="260" height="162"/>
    <text x="24" y="36" class="dark-title">Old Actor</text>
    <text x="24" y="64" class="text">冻结旧 policy</text>
    <text x="24" y="90" class="code">old_logp: [B]</text>
    <text x="24" y="116" class="code">ratio = exp(actor-old)</text>
    <text x="24" y="142" class="small">比较新旧模型有多想生成这条回答</text>
  </g>

  <g transform="translate(830,310)">
    <rect class="card" width="260" height="142"/>
    <text x="24" y="36" class="dark-title">Ref Model</text>
    <text x="24" y="64" class="text">冻结参考模型</text>
    <text x="24" y="90" class="code">ref_logp: [B]</text>
    <text x="24" y="116" class="code">kl_ref = actor - ref</text>
  </g>

  <path class="dash" d="M672 226 C590 260 455 288 350 342"/>
  <path class="dash" d="M672 226 C668 260 630 278 590 300"/>
  <path class="dash" d="M672 226 C755 260 860 286 940 310"/>

  <g transform="translate(210,548)">
    <rect width="760" height="112" rx="26" fill="url(#loss)" filter="url(#shadow)"/>
    <text x="38" y="36" class="light-title">PPO Loss</text>
    <text x="38" y="64" class="white-code">policy_loss = -min(ratio * adv, clip(ratio) * adv)</text>
    <text x="38" y="88" class="white-code">total = policy_loss + vf_coef * value_loss + kl_coef * kl_ref + aux_loss</text>
  </g>

  <path class="arrow" d="M220 452 C282 506 340 528 450 548"/>
  <path class="arrow" d="M590 462 V543"/>
  <path class="arrow" d="M960 452 C900 504 840 528 740 548"/>

  <g transform="translate(72,700)">
    <text class="small" x="0" y="0">学习抓手：critic 回答“预期能得多少分”，old actor 回答“更新前有多想生成它”，ref model 回答“别偏离原始模型太远”。</text>
    <text class="small" x="0" y="24">当前阶段先按源码理解 PPO 的近端约束；严格 policy gradient、GAE、KL 推导可在后续数学补充中展开。</text>
  </g>
</svg>
