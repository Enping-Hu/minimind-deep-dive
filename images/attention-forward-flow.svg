<svg xmlns="http://www.w3.org/2000/svg" width="1520" height="980" viewBox="0 0 1520 980" role="img" aria-labelledby="title desc">
  <title id="title">Attention.forward 信息流</title>
  <desc id="desc">展示 Attention.forward 中输入张量如何经过 QKV 投影、RoPE、KV cache、repeat_kv、打分、mask、softmax、加权汇总与输出投影，最终得到新的 hidden states。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#f4fbf6"/>
    </linearGradient>
    <linearGradient id="mainBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f8fbff"/>
    </linearGradient>
    <linearGradient id="blueBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="greenBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="orangeBox" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#475569" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 800 34px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #475569; }
      .label { font: 700 22px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #0f172a; }
      .small { font: 500 16px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #475569; }
      .hint { font: 500 15px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #64748b; }
      .code { font: 700 18px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #334155; }
      .box { fill: url(#mainBox); stroke: #cbd5e1; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .blue { fill: url(#blueBox); stroke: #2563eb; stroke-width: 2.2; rx: 20; filter: url(#shadow); }
      .green { fill: url(#greenBox); stroke: #16a34a; stroke-width: 2.2; rx: 20; filter: url(#shadow); }
      .orange { fill: url(#orangeBox); stroke: #ea580c; stroke-width: 2.2; rx: 20; filter: url(#shadow); }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .panel { fill: #ffffff; stroke: #dbe4ee; stroke-width: 2; rx: 22; filter: url(#shadow); }
    </style>
  </defs>

  <rect width="1520" height="980" fill="url(#bg)"/>
  <text x="56" y="64" class="title">Attention.forward：从 QKV 到新的上下文表示</text>
  <text x="56" y="96" class="subtitle">这条链把前面零散学过的 Q/K/V、RoPE、GQA、KV cache、mask、softmax 和 o_proj 全部落到同一个 forward 里。</text>

  <rect x="46" y="126" width="1428" height="804" class="panel"/>

  <rect x="86" y="194" width="200" height="88" class="box"/>
  <text x="186" y="228" text-anchor="middle" class="label">输入</text>
  <text x="186" y="258" text-anchor="middle" class="code">x: [B, T, H]</text>

  <path d="M286 238 L368 238" class="arrow"/>

  <rect x="368" y="154" width="318" height="168" class="blue"/>
  <text x="527" y="194" text-anchor="middle" class="label">Q / K / V 线性投影</text>
  <text x="527" y="228" text-anchor="middle" class="code">q_proj / k_proj / v_proj</text>
  <text x="527" y="260" text-anchor="middle" class="small">Q: [B,T,n_h,d]</text>
  <text x="527" y="288" text-anchor="middle" class="small">K,V: [B,T,n_kv,d]</text>

  <path d="M686 238 L776 238" class="arrow"/>

  <rect x="776" y="178" width="248" height="120" class="green"/>
  <text x="900" y="214" text-anchor="middle" class="label">RoPE</text>
  <text x="900" y="246" text-anchor="middle" class="code">apply_rotary_pos_emb</text>
  <text x="900" y="274" text-anchor="middle" class="small">只作用在 Q / K</text>

  <path d="M1024 238 L1110 238" class="arrow"/>

  <rect x="1110" y="154" width="302" height="168" class="orange"/>
  <text x="1261" y="190" text-anchor="middle" class="label">KV cache + repeat_kv</text>
  <text x="1261" y="222" text-anchor="middle" class="small">先与 past K/V 拼接</text>
  <text x="1261" y="250" text-anchor="middle" class="small">再把 KV 头复制到和 Q 头一致</text>
  <text x="1261" y="278" text-anchor="middle" class="code">[B,T_all,n_h,d]</text>

  <path d="M1261 322 L1261 410" class="arrow"/>

  <rect x="1044" y="410" width="382" height="154" class="blue"/>
  <text x="1235" y="448" text-anchor="middle" class="label">转置后进入打分空间</text>
  <text x="1235" y="482" text-anchor="middle" class="code">Q,K,V -> [B,n_h,T,d]</text>
  <text x="1235" y="512" text-anchor="middle" class="small">scores = Q K^T / sqrt(d)</text>
  <text x="1235" y="540" text-anchor="middle" class="small">scores: [B,n_h,T,T_all]</text>

  <path d="M1044 490 L904 490" class="arrow"/>

  <rect x="668" y="398" width="300" height="178" class="green"/>
  <text x="818" y="436" text-anchor="middle" class="label">mask + softmax</text>
  <text x="818" y="470" text-anchor="middle" class="small">先加 causal mask</text>
  <text x="818" y="498" text-anchor="middle" class="small">再加 padding mask</text>
  <text x="818" y="526" text-anchor="middle" class="code">softmax(scores)</text>
  <text x="818" y="554" text-anchor="middle" class="small">得到注意力权重</text>

  <path d="M668 490 L530 490" class="arrow"/>

  <rect x="286" y="410" width="298" height="154" class="orange"/>
  <text x="435" y="448" text-anchor="middle" class="label">加权汇总 Value</text>
  <text x="435" y="482" text-anchor="middle" class="code">output = scores @ V</text>
  <text x="435" y="512" text-anchor="middle" class="small">output: [B,n_h,T,d]</text>
  <text x="435" y="540" text-anchor="middle" class="small">每个 head 汇总自己的上下文</text>

  <path d="M286 490 L170 490" class="arrow"/>

  <rect x="82" y="410" width="156" height="154" class="blue"/>
  <text x="160" y="448" text-anchor="middle" class="label">拼头</text>
  <text x="160" y="482" text-anchor="middle" class="small">transpose + reshape</text>
  <text x="160" y="516" text-anchor="middle" class="code">[B,T,H]</text>

  <path d="M160 564 L160 654" class="arrow"/>

  <rect x="74" y="654" width="172" height="108" class="green"/>
  <text x="160" y="692" text-anchor="middle" class="label">o_proj</text>
  <text x="160" y="722" text-anchor="middle" class="small">多头信息重新汇总</text>
  <text x="160" y="748" text-anchor="middle" class="code">resid_dropout</text>

  <path d="M246 708 L378 708" class="arrow"/>

  <rect x="378" y="654" width="246" height="108" class="box"/>
  <text x="501" y="692" text-anchor="middle" class="label">输出</text>
  <text x="501" y="722" text-anchor="middle" class="code">output: [B,T,H]</text>
  <text x="501" y="748" text-anchor="middle" class="small">送回 block 残差分支</text>

  <rect x="744" y="654" width="648" height="108" class="box"/>
  <text x="1068" y="690" text-anchor="middle" class="label">两条实现路径</text>
  <text x="1068" y="722" text-anchor="middle" class="small">满足条件时走 Flash Attention；否则走显式 `scores -> mask -> softmax -> @V` 路径。</text>
  <text x="1068" y="748" text-anchor="middle" class="small">源码精读优先抓普通路径，因为它把注意力的每一步都暴露出来了。</text>

  <rect x="86" y="820" width="1324" height="70" class="box"/>
  <text x="748" y="850" text-anchor="middle" class="small">一句话抓手：Attention.forward 不是“算一下 QK^T”这么简单，而是“QKV 投影 -> 位置信息注入 -> KV 共享对齐 -> 分数计算与屏蔽 -> 汇总 value -> 多头合并输出”的完整工程链。</text>
</svg>
