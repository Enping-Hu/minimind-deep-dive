<svg xmlns="http://www.w3.org/2000/svg" width="1640" height="1120" viewBox="0 0 1640 1120" role="img" aria-labelledby="title desc">
  <title id="title">MiniMind 项目级源码主线图</title>
  <desc id="desc">把 MiniMind 的五个关键源码入口重新映射回一条完整项目主线，包括数据构造、模型前向、训练信号形成与参数更新。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="100%" stop-color="#fff9f2"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9fbff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#475569" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto">
      <path d="M0,0 L0,8 L11,4 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 800 34px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #0f172a; }
      .subtitle { font: 500 18px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #475569; }
      .label { font: 700 22px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #0f172a; }
      .small { font: 500 16px 'PingFang SC','Microsoft YaHei','Noto Sans CJK SC',sans-serif; fill: #475569; }
      .mono { font: 700 17px 'SFMono-Regular','Menlo','Consolas',monospace; fill: #334155; }
      .panel { fill: url(#panel); stroke: #dbe4ee; stroke-width: 2; rx: 24; filter: url(#shadow); }
      .data { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2.2; rx: 20; filter: url(#shadow); }
      .model { fill: #dcfce7; stroke: #16a34a; stroke-width: 2.2; rx: 20; filter: url(#shadow); }
      .objective { fill: #fef3c7; stroke: #d97706; stroke-width: 2.2; rx: 20; filter: url(#shadow); }
      .update { fill: #f3e8ff; stroke: #7c3aed; stroke-width: 2.2; rx: 20; filter: url(#shadow); }
      .summary { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 18; filter: url(#shadow); }
      .arrow { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .divider { stroke: #e2e8f0; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1640" height="1120" fill="url(#bg)"/>
  <text x="56" y="64" class="title">MiniMind：五个关键源码入口如何拼成一条项目主线</text>
  <text x="56" y="96" class="subtitle">这一图不是新知识点，而是把前面各章已经拆开的模块，重新收束成“数据构造 -> 模型前向 -> 训练信号 -> 参数更新”的完整项目故事。</text>

  <rect x="42" y="128" width="1554" height="936" class="panel"/>

  <rect x="86" y="180" width="330" height="154" class="data"/>
  <text x="251" y="220" text-anchor="middle" class="label">数据层</text>
  <text x="251" y="252" text-anchor="middle" class="mono">SFTDataset.generate_labels</text>
  <text x="251" y="282" text-anchor="middle" class="small">决定哪些 token 参与监督</text>
  <text x="251" y="310" text-anchor="middle" class="small">`labels` 与 `-100` 掩码从这里开始</text>

  <path d="M416 257 L516 257" class="arrow"/>

  <rect x="516" y="180" width="330" height="154" class="model"/>
  <text x="681" y="220" text-anchor="middle" class="label">模型内部计算</text>
  <text x="681" y="252" text-anchor="middle" class="mono">Attention.forward</text>
  <text x="681" y="282" text-anchor="middle" class="small">QKV, RoPE, GQA, mask, softmax, o_proj</text>
  <text x="681" y="310" text-anchor="middle" class="small">token 间信息如何真正交互</text>

  <path d="M846 257 L946 257" class="arrow"/>

  <rect x="946" y="180" width="330" height="154" class="model"/>
  <text x="1111" y="220" text-anchor="middle" class="label">模型输出层</text>
  <text x="1111" y="252" text-anchor="middle" class="mono">MiniMindForCausalLM.forward</text>
  <text x="1111" y="282" text-anchor="middle" class="small">hidden_states -> logits -> shift -> CE loss</text>
  <text x="1111" y="310" text-anchor="middle" class="small">next-token prediction 在这里真正对齐</text>

  <path d="M1276 257 L1378 257" class="arrow"/>

  <rect x="1378" y="180" width="166" height="154" class="update"/>
  <text x="1461" y="232" text-anchor="middle" class="label">更新</text>
  <text x="1461" y="266" text-anchor="middle" class="small">backward</text>
  <text x="1461" y="294" text-anchor="middle" class="small">step</text>

  <line x1="78" y1="386" x2="1554" y2="386" class="divider"/>

  <rect x="112" y="434" width="640" height="234" class="objective"/>
  <text x="432" y="474" text-anchor="middle" class="label">离线监督 / 偏好目标</text>
  <text x="432" y="514" text-anchor="middle" class="mono">SFT -> DPO</text>
  <text x="140" y="556" class="small">1. SFT：assistant-only labels 配合 `shift + cross_entropy`</text>
  <text x="140" y="588" class="small">2. DPO：`dpo_loss` 比较 policy/ref 对 chosen 与 rejected 的相对偏好差</text>
  <text x="140" y="620" class="small">3. 关键变化不在模型骨架，而在训练信号与目标函数</text>

  <rect x="888" y="434" width="640" height="234" class="objective"/>
  <text x="1208" y="474" text-anchor="middle" class="label">在线 reward 目标</text>
  <text x="1208" y="514" text-anchor="middle" class="mono">PPO / GRPO / SPO</text>
  <text x="916" y="556" class="small">1. 共享前半段：`prompt -> generate -> reward`</text>
  <text x="916" y="588" class="small">2. 差异主要在 baseline/advantage：critic, group-relative, tracker</text>
  <text x="916" y="620" class="small">3. 后半段重新收束：KL/ref, aux_loss, backward, optimizer.step</text>

  <path d="M432 668 L432 760" class="arrow"/>
  <path d="M1208 668 L1208 760" class="arrow"/>

  <rect x="270" y="760" width="1100" height="138" class="update"/>
  <text x="820" y="800" text-anchor="middle" class="label">统一更新视角</text>
  <text x="820" y="834" text-anchor="middle" class="small">不管是 SFT、DPO 还是 PPO/GRPO/SPO，最终都要把训练信号写成可求导目标，再通过 `loss.backward()` 和 `optimizer.step()` 更新同一个 CausalLM 参数。</text>
  <text x="820" y="866" text-anchor="middle" class="small">所以项目真正的主线不是“算法名堆砌”，而是“训练信号怎样一层层落到参数更新”。</text>

  <rect x="96" y="938" width="1444" height="84" class="summary"/>
  <text x="818" y="972" text-anchor="middle" class="small">一句话抓手：前向讲“loss 怎么形成”，内部计算讲“模型内部怎么算”，各训练阶段讲“训练信号怎么变化”，合起来才是完整的 MiniMind 项目级理解。</text>
  <text x="818" y="1000" text-anchor="middle" class="small">当前已经具备源码级理解证据；尚未具备真实环境与真实 run 证据，所以只能稳讲“机制”，不能冒进讲“效果”。</text>
</svg>
