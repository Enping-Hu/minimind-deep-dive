<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="740" viewBox="0 0 1180 740" role="img" aria-labelledby="title desc">
  <title id="title">MiniMind GRPO 组内相对优势流程图</title>
  <desc id="desc">展示 GRPO 如何对同一个 prompt 生成多条回答，使用组内 reward 均值和方差构造 advantage，并用 KL 约束更新 policy。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="0.52" stop-color="#f3fbf2"/>
      <stop offset="1" stop-color="#fff7e8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d9c72"/>
      <stop offset="1" stop-color="#1f8aa5"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e29835"/>
      <stop offset="1" stop-color="#c95742"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#17324d" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#315166"/>
    </marker>
    <style>
      .title { font: 700 30px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #163247; }
      .subtitle { font: 400 15px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #52677a; }
      .card { fill: #ffffff; stroke: #d7e4ea; stroke-width: 1.3; rx: 22; filter: url(#shadow); }
      .response { fill: #ffffff; stroke: #cde2d5; stroke-width: 1.3; rx: 18; filter: url(#shadow); }
      .box-title { font: 700 18px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #17324d; }
      .text { font: 400 14px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #43576a; }
      .small { font: 400 12px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #647789; }
      .code { font: 600 13px 'JetBrains Mono', 'Menlo', monospace; fill: #24485d; }
      .white-title { font: 700 18px 'Noto Sans CJK SC', 'PingFang SC', sans-serif; fill: #ffffff; }
      .white-code { font: 600 13px 'JetBrains Mono', 'Menlo', monospace; fill: #ffffff; }
      .arrow { stroke: #315166; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #8da3ae; stroke-width: 2; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect width="1180" height="740" fill="url(#bg)"/>
  <circle cx="1045" cy="115" r="120" fill="#f5c56a" opacity="0.22"/>
  <circle cx="110" cy="620" r="150" fill="#4ea7c7" opacity="0.12"/>
  <path d="M0 126 C180 78 292 172 456 124 S760 62 936 140 S1100 190 1180 148" fill="none" stroke="#9bc8b7" stroke-width="2" opacity="0.42"/>

  <text x="58" y="58" class="title">GRPO：用组内相对优势替代 critic</text>
  <text x="58" y="86" class="subtitle">同一个 prompt 生成多条回答，用组内 reward 均值和方差判断“哪条比同组更好”，从而不需要单独训练 critic。</text>

  <g transform="translate(70,132)">
    <rect class="card" width="190" height="96"/>
    <text x="24" y="36" class="box-title">Prompt</text>
    <text x="24" y="62" class="text">同一个问题</text>
    <text x="24" y="80" class="small">batch 中每条 prompt</text>
  </g>

  <g transform="translate(330,122)">
    <rect width="230" height="116" rx="24" fill="url(#green)" filter="url(#shadow)"/>
    <text x="26" y="38" class="white-title">Policy 采样</text>
    <text x="26" y="68" class="white-code">num_return_sequences = G</text>
    <text x="26" y="92" class="white-code">outputs: [B*G, P+R]</text>
  </g>

  <path class="arrow" d="M260 180 H326"/>

  <g transform="translate(650,105)">
    <rect class="response" width="420" height="172"/>
    <text x="28" y="34" class="box-title">同组多条回答</text>
    <text x="28" y="66" class="code">response 1: reward = 2.1</text>
    <text x="28" y="94" class="code">response 2: reward = 0.4</text>
    <text x="28" y="122" class="code">response 3: reward = 1.5</text>
    <text x="28" y="150" class="small">真实代码默认 G = args.num_generations，例如 8</text>
  </g>

  <path class="arrow" d="M560 180 H646"/>

  <g transform="translate(92,350)">
    <rect class="card" width="280" height="140"/>
    <text x="24" y="36" class="box-title">组内统计</text>
    <text x="24" y="68" class="code">grouped_rewards: [B, G]</text>
    <text x="24" y="96" class="code">mean_r, std_r</text>
    <text x="24" y="120" class="small">只在同一个 prompt 的回答之间比较</text>
  </g>

  <g transform="translate(450,340)">
    <rect width="310" height="160" rx="24" fill="url(#orange)" filter="url(#shadow)"/>
    <text x="28" y="38" class="white-title">Group Advantage</text>
    <text x="28" y="72" class="white-code">adv = (reward - mean) / std</text>
    <text x="28" y="102" class="white-code">advantages: [B*G]</text>
    <text x="28" y="130" class="white-code">高于同组平均 → 正优势</text>
  </g>

  <g transform="translate(838,350)">
    <rect class="card" width="260" height="140"/>
    <text x="24" y="36" class="box-title">Policy Loss</text>
    <text x="24" y="68" class="code">per_token_logps</text>
    <text x="24" y="96" class="code">+ KL(ref, policy)</text>
    <text x="24" y="120" class="small">只统计 completion token</text>
  </g>

  <path class="dash" d="M860 277 C740 322 522 316 330 350"/>
  <path class="arrow" d="M372 420 H446"/>
  <path class="arrow" d="M760 420 H834"/>

  <g transform="translate(135,585)">
    <rect class="card" width="910" height="78"/>
    <text x="34" y="32" class="box-title">和 PPO 的关键区别</text>
    <text x="34" y="58" class="text">PPO 用 critic 估计 baseline；GRPO 不训练 critic，而是让同一 prompt 的多条回答互相比较，用组内均值/方差构造 advantage。</text>
  </g>

  <g transform="translate(78,705)">
    <text class="small" x="0" y="0">读源码抓手：`num_return_sequences`、`rewards.view(-1, num_generations)`、`mean_r/std_r`、`advantages`、`completion_mask`、`per_token_kl`。</text>
  </g>
</svg>
